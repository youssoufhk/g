name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (hooks + M1 lint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  backend:
    name: backend (unit + property + contract)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Ruff
        run: .venv/bin/ruff check app tests
      - name: Pytest
        run: .venv/bin/pytest -q --cov=app --cov-report=term --cov-fail-under=60

  frontend:
    name: frontend (typecheck + vitest)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lock
        run: |
          if [[ -f package-lock.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.lock.outputs.present == 'true'
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci)
        if: steps.lock.outputs.present == 'true'
        run: npm ci
      - name: Typecheck
        if: steps.lock.outputs.present == 'true'
        run: npm run typecheck
      - name: Vitest
        if: steps.lock.outputs.present == 'true'
        run: npm test -- --run
      - name: Lockfile missing (skip)
        if: steps.lock.outputs.present != 'true'
        run: |
          echo "::warning title=Frontend skipped::No package-lock.json yet. Run 'npm install' in frontend/ and commit the lockfile to enable this job."
