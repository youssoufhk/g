# Gamma pre-commit configuration.
#
# See https://pre-commit.com for documentation.
# Install: pipx install pre-commit && pre-commit install
# Reference: docs/runbooks/secrets-management.md section 9.
#
# The goal of these hooks is to catch, locally before any commit, the three
# classes of mistakes that are expensive to fix after the fact:
#   1. Committed secrets (API tokens, keys, passwords) via gitleaks.
#   2. Style drift (trailing whitespace, missing final newline, large files,
#      malformed YAML/JSON, unresolved merge conflicts).
#   3. Banned vocabulary that the founder hates: em dashes and "utilisation"
#      (CLAUDE.md rules 5 and 6).

# Top-level exclude. These directories are never linted by any hook because
# they are archived or frozen content we do not modify:
#   - old/        archived originals from before the reorganization; historical record
#   - prototype/  locked visual reference (CLAUDE.md rule 2)
#   - .continue/  Continue IDE local configuration, not ours to lint
#   - infra/ops/.venv/  Python virtual environment
#   - node_modules/     Node dependencies
exclude: '^(old/|prototype/|\.continue/|infra/ops/\.venv/|node_modules/)'

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Scan staged diff for secrets (gitleaks)
        entry: gitleaks protect --staged --verbose --redact

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: no-em-dashes
        name: Ban em dashes and en dashes
        language: system
        entry: python3 scripts/hooks/no_em_dashes.py
        files: '\.(md|mdx|ts|tsx|js|jsx|py|txt|yaml|yml)$'
        # Skill definitions legitimately contain the literal em dash
        # character when they document the grep command that searches
        # for it. A grep pattern cannot show the character without
        # including it. Same rationale as the no-utilisation allowlist
        # below.
        exclude: |
          (?x)^(
            \.claude/skills/.*|
            scripts/hooks/no_em_dashes\.py
          )$

      - id: m1-vendor-imports
        name: M1 forbid vendor SDK imports outside wrappers
        language: system
        entry: python3 scripts/hooks/check_vendor_imports.py
        files: '^backend/.*\.py$'

      - id: no-utilisation
        name: Ban the word utilisation
        language: system
        entry: python3 scripts/hooks/no_utilisation.py
        files: '\.(md|mdx|ts|tsx|js|jsx|py|txt|yaml|yml)$'
        # Files below legitimately reference the banned word because they
        # define, document, or enforce the ban rule itself. Any NEW file
        # that uses "utilisation" in real prose is caught.
        exclude: |
          (?x)^(
            CLAUDE\.md|
            EXECUTION_CHECKLIST\.md|
            agents/AGENTS\.md|
            docs/SCOPE\.md|
            docs/FLAWLESS_GATE\.md|
            docs/COUNTRY_PLAYBOOKS\.md|
            docs/runbooks/secrets-management\.md|
            docs/runbooks/dev-machine-bootstrap\.md|
            specs/AI_FEATURES\.md|
            \.pre-commit-config\.yaml|
            scripts/hooks/no_utilisation\.py|
            scripts/setup/bootstrap-dev\.sh|
            PROMPT\.md|
            \.claude/skills/.*
          )$
